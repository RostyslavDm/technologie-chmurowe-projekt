services:
  app:                                   # 1. kontener: aplikacja (nginx + php-fpm)
    build: .                             # buduje obraz z Twojego Dockerfile
    ports:
      - "80:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}                # z pliku .env (tworzysz go na VM)
      APP_URL: http://localhost
      DB_TYPE: mysql                     # przelacza Database.php na MySQL
      DB_HOST: db                        # nazwa serwisu ponizej = adres bazy w sieci
      DB_DATABASE: plant_diary
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy       # app startuje dopiero, gdy MySQL gotowy
    restart: unless-stopped

  db:                                    # 2. kontener: baza danych MySQL
    image: mysql:8
    environment:
      MYSQL_DATABASE: plant_diary
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql            # dane przezywaja restart
      - ./database/plant_diary_mysql.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  dbdata:
