# Wdrozenie mikrouslug przez docker compose (maszyna wirtualna Azure).
# caddy = reverse proxy z automatycznym HTTPS (Let's Encrypt)
# app   = aplikacja Laravel (nginx + php-fpm)
# db    = osobny kontener bazy MySQL
# Kontenery komunikuja sie po sieci docker compose (caddy -> app -> db).
# APP_KEY, DB_PASSWORD i SITE_ADDRESS pochodza z pliku .env (tworzony na VM, nie commitowany).

services:
  caddy:                                 # 3. reverse proxy: HTTPS (Let's Encrypt) -> app
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    command: caddy reverse-proxy --from ${SITE_ADDRESS} --to app:80
    depends_on:
      - app
    volumes:
      - caddydata:/data                  # trwale certyfikaty (limit Let's Encrypt)
    restart: unless-stopped

  app:                                   # 1. kontener: aplikacja (nginx + php-fpm)
    build: .                             # buduje obraz z Dockerfile
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: https://${SITE_ADDRESS}
      SESSION_DRIVER: file               # sesje w plikach (nie w bazie Laravela)
      CACHE_STORE: file
      DB_TYPE: mysql                     # przelacza Database.php na MySQL
      DB_HOST: db                        # nazwa serwisu = adres bazy w sieci
      DB_DATABASE: plant_diary
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy       # app startuje dopiero, gdy MySQL gotowy
    restart: unless-stopped

  db:                                    # 2. kontener: baza danych MySQL
    image: mysql:8
    environment:
      MYSQL_DATABASE: plant_diary
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql            # dane przezywaja restart
      - ./database/plant_diary_mysql.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  dbdata:
  caddydata:
